# Pin the Gradle daemon's JVM. AGP 8.5.2's bundled Lint uses an IntelliJ
# UAST that fails to parse Java version "25.0.2" (Homebrew's openjdk),
# crashing :app:lintAnalyzeDebug with IllegalArgumentException.
#
# 21 matches Android Studio's bundled JBR (JAVA_VERSION=21.0.10), so the
# daemon can be served by either:
#   - a system JDK 21 found via Gradle's auto-detection
#   - the AS JBR pointed to by org.gradle.java.installations.paths in
#     gradle.properties (default for this repo on macOS)
toolchainVersion=21
