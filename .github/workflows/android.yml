name: Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'android/**'
      - '.github/workflows/android.yml'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write       # upload-release-asset on tagged releases
    runs-on: ubuntu-latest

    env:
      ANDROID_DIR: android
      APK_PATH:   android/app/build/outputs/apk/debug/app-debug.apk

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5.2.0
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v4.0.1

    # AGP auto-installs the NDK + CMake versions our build.gradle pins, but
    # priming them up front gives a clearer log when something's wrong with
    # the toolchain pin instead of failing mid-build.
    - name: Install NDK 26 and CMake 3.22.1
      run: |
        sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1" >/dev/null

    # FetchContent_Declare clones SDL3 (~80MB shallow) plus SDL3_image's
    # vendored codec submodules (libpng/libjxl/libavif/dav1d/libwebp/...).
    # Cache the .cxx tree so subsequent runs skip those clones.
    - name: Cache Gradle
      uses: actions/cache@v5.0.5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle.properties') }}
        restore-keys: |
          gradle-

    - name: Cache CMake FetchContent (SDL3 et al)
      uses: actions/cache@v5.0.5
      with:
        path: android/app/.cxx
        key: android-cxx-${{ hashFiles('src/sdl3_compat/CMakeLists.txt') }}
        restore-keys: |
          android-cxx-

    - name: Show toolchain
      run: |
        java -version
        gradle --version || true
        echo "ANDROID_HOME=$ANDROID_HOME"

    - name: Build APK
      working-directory: ${{ env.ANDROID_DIR }}
      run: gradle assembleDebug --stacktrace

    # Lint runs after the build so toolchain / native-link issues surface
    # first with their own clear failure. Fails the pipeline on lint
    # errors (warnings still pass).
    - name: Lint
      working-directory: ${{ env.ANDROID_DIR }}
      run: gradle :app:lint --stacktrace

    - name: Upload lint reports
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: lint-reports
        path: |
          android/app/build/reports/lint-results-*.html
          android/app/build/reports/lint-results-*.xml
        if-no-files-found: ignore

    - name: Stage artifact
      run: |
        mkdir -p staging
        cp "$APK_PATH" staging/ddkp-debug.apk
        cp README.md LICENSE staging/ 2>/dev/null || true
        (cd staging && zip -r ../ddkp_android.zip .)

    - name: Upload artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: ddkp_android
        path: ddkp_android.zip

    - name: Attach to release
      uses: softprops/action-gh-release@v3.0.0
      with:
        files: ddkp_android.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: github.event_name == 'release' && github.event.action == 'published'
