    <!-- Web Style -->
    <!--
      Full-canvas layout: the wasm build is landscape (800x450), matching the
      desktop build exactly. Phone players are expected to hold their device
      landscape; the canvas letterboxes if held portrait. Input is in-canvas
      (swipe to move, tap to interact, corner ⋮ menu for stats / inventory /
      save). The only HTML chrome is a small fullscreen toggle in the top-
      left, out of the way of the in-canvas menu button (top-right).
    -->
    <style>
        html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          /* dvh = dynamic viewport height — shrinks when the mobile URL bar is
             visible so the canvas is sized to what the user can actually see.
             Fallback to vh for browsers that don't support dvh. */
          height: 100vh;
          height: 100dvh;
          background-color: #1a1a1a; /* letterbox bars when aspect doesn't match */
          color: #2b2b2b;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          overflow: hidden;
          -webkit-user-select: none;
          user-select: none;
          -webkit-tap-highlight-color: transparent;
          overscroll-behavior: none;
        }
        body {
          display: flex;
          align-items: center;
          justify-content: center;
          /* viewport-fit=cover lets the page sit under the notch / home
             indicator / Dynamic Island on iPhone. Pad the body by the safe-
             area insets so the canvas (centered via flex) is never placed
             under system UI and its HUD corners stay reachable. */
          box-sizing: border-box;
          padding-top:    env(safe-area-inset-top, 0);
          padding-bottom: env(safe-area-inset-bottom, 0);
          padding-left:   env(safe-area-inset-left, 0);
          padding-right:  env(safe-area-inset-right, 0);
        }
        canvas.emscripten {
          display: block;
          border: 0 none;
          background-color: #F7EFD9;
          padding: 0;
          margin: 0;
          /* JS sets width/height per frame so the canvas fits the visible
             viewport and preserves the 800x450 aspect. */
          /* Smooth bilinear scaling — the game renders procedural primitives
             and a bitmap default font, neither of which want nearest-neighbor
             upscaling. `pixelated` was making text look chunky on phones; the
             auto value lets the browser smooth the canvas to whatever CSS
             size we land on. */
          image-rendering: auto;
          touch-action: none;
        }

        /* Desktop — render at native landscape resolution. Fullscreen button
           still sits in the top-left but is rarely needed; desktop users hit
           F11 instead. */
        @media (hover: hover) and (pointer: fine) {
          canvas.emscripten {
            width: 800px;
            height: 450px;
          }
        }

        /* Floating fullscreen toggle. Small, translucent, parchment-styled so
           it doesn't clash with the in-canvas UI. Top-left so it doesn't
           collide with the in-game ⋮ menu button, which sits top-right. */
        #fs-btn {
          position: fixed;
          top: calc(8px + env(safe-area-inset-top, 0));
          left: calc(8px + env(safe-area-inset-left, 0));
          width: 36px;
          height: 36px;
          background: rgba(217, 201, 163, 0.85);
          color: #2b2b2b;
          border: 1.5px solid #2b2b2b;
          border-radius: 8px;
          font-size: 18px;
          line-height: 1;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          z-index: 10;
          -webkit-tap-highlight-color: transparent;
          touch-action: manipulation;
        }
        #fs-btn:active {
          background: rgba(184, 159, 108, 0.95);
        }

        /* iOS "Add to Home Screen" hint. Shown only on iOS Safari when the
           page is not already running standalone. Bottom-centered so it
           doesn't fight with the in-canvas controls; tapping the ✕ dismisses
           it for the session (localStorage). The arrow points down at the
           Safari share button on the iPhone tab bar. */
        #ios-a2hs {
          position: fixed;
          left:  calc(8px + env(safe-area-inset-left, 0));
          right: calc(8px + env(safe-area-inset-right, 0));
          bottom: calc(8px + env(safe-area-inset-bottom, 0));
          margin: 0 auto;
          max-width: 360px;
          background: rgba(247, 239, 217, 0.96);
          color: #2b2b2b;
          border: 1.5px solid #2b2b2b;
          border-radius: 10px;
          padding: 10px 36px 10px 12px;
          font-size: 13px;
          line-height: 1.35;
          z-index: 11;
          display: none;
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }
        #ios-a2hs.show { display: block; }
        #ios-a2hs b { font-weight: 600; }
        #ios-a2hs-close {
          position: absolute;
          top: 4px;
          right: 6px;
          width: 24px;
          height: 24px;
          background: transparent;
          color: #2b2b2b;
          border: 0;
          font-size: 18px;
          line-height: 1;
          cursor: pointer;
          -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script type='text/javascript' src="https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js/dist/FileSaver.min.js"> </script>
    <script type='text/javascript'>
        function saveFileFromMEMFSToDisk(memoryFSname, localFSname)     // This can be called by C/C++ code
        {
            var isSafari = false; // Not supported, navigator.userAgent access is being restricted
            //var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            var data = FS.readFile(memoryFSname);
            var blob;

            if (isSafari) blob = new Blob([data.buffer], { type: "application/octet-stream" });
            else blob = new Blob([data.buffer], { type: "application/octet-binary" });

            // NOTE: SaveAsDialog is a browser setting. For example, in Google Chrome,
            // in Settings/Advanced/Downloads section you have a setting:
            // 'Ask where to save each file before downloading' - which you can set true/false.
            // If you enable this setting it would always ask you and bring the SaveAsDialog
            saveAs(blob, localFSname);
        }
    </script>
    </head>
    <body>
        <canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas>
        <button id="fs-btn" aria-label="Fullscreen">⛶</button>
        <div id="ios-a2hs" role="note">
            For the best experience, tap <b>Share</b> then <b>Add to Home Screen</b> ↓
            <button id="ios-a2hs-close" aria-label="Dismiss">✕</button>
        </div>
        <p id="output" style="display:none"></p>
        <script>
            var Module = {
                print: (function() {
                    var element = document.getElementById('output');
                    if (element) element.value = ''; // clear browser cache
                    return function(text) {
                        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                        console.log(text);
                        if (element) {
                          element.value += text + "\n";
                          element.scrollTop = element.scrollHeight; // focus on bottom
                        }
                    };
                })(),
                canvas: (function() {
                    var canvas = document.getElementById('canvas');
                    // Prevent right-click context menu and native touch gestures
                    // (scroll / pinch-zoom / long-press image-save) on the canvas.
                    canvas.addEventListener('touchstart', function(e){ e.preventDefault(); }, { passive: false });
                    canvas.addEventListener('touchmove',  function(e){ e.preventDefault(); }, { passive: false });
                    return canvas;
                })(),
                // Persistent saves on the web build. MEMFS is the default (and
                // evaporates on reload), so we mount IDBFS at /save and pull
                // any previously-saved data into memory before main() runs.
                // save.c writes to /save/savegame.dat and calls FS.syncfs to
                // flush MEMFS → IndexedDB; the reverse pull happens here.
                // addRunDependency / removeRunDependency makes emscripten wait
                // for syncfs(true) to complete before invoking main().
                preRun: [function () {
                    if (typeof IDBFS === 'undefined') {
                        console.warn('IDBFS not linked — saves will not persist. ' +
                                     'Build needs -lidbfs.js.');
                        return;
                    }
                    try {
                        FS.mkdir('/save');
                    } catch (e) { /* already exists on hot reload — ignore */ }
                    try {
                        FS.mount(IDBFS, {}, '/save');
                    } catch (e) {
                        console.warn('IDBFS mount failed — saves will not persist:', e);
                        return;
                    }
                    addRunDependency('idbfs-sync');
                    FS.syncfs(true, function (err) {
                        if (err) console.warn('save syncfs(load) failed:', err);
                        else    console.log('save: IDBFS loaded from IndexedDB');
                        removeRunDependency('idbfs-sync');
                    });
                }]
            };
        </script>

        <script>
        (function () {
            var canvas = document.getElementById('canvas');
            var fsBtn  = document.getElementById('fs-btn');
            var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

            // iOS "Add to Home Screen" hint. Real fullscreen + landscape lock
            // and a dock-icon launch are only available on iOS when the page
            // is launched as a standalone PWA, so nudge Safari users toward
            // it. Conditions:
            //   - userAgent matches iPhone / iPad / iPod (or iPadOS, which
            //     reports "MacIntel" + multi-touch)
            //   - not already standalone (navigator.standalone or display-
            //     mode media query)
            //   - user hasn't dismissed the hint this device
            // Other iOS browsers (Chrome/Firefox iOS) don't support adding
            // PWAs from their share sheet, so we restrict to Safari only.
            var ua = navigator.userAgent || '';
            var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            var isSafari = /^((?!CriOS|FxiOS|EdgiOS|OPiOS).)*Safari/.test(ua);
            var isStandalone = window.navigator.standalone === true ||
                               (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
            var dismissed = false;
            try { dismissed = localStorage.getItem('a2hs-dismissed') === '1'; } catch (e) {}
            if (isIOS && isSafari && !isStandalone && !dismissed) {
                var banner = document.getElementById('ios-a2hs');
                banner.classList.add('show');
                document.getElementById('ios-a2hs-close').addEventListener('click', function () {
                    banner.classList.remove('show');
                    try { localStorage.setItem('a2hs-dismissed', '1'); } catch (e) {}
                });
            }

            // Fullscreen toggle — tries documentElement, then canvas, then
            // emscripten's Module.requestFullscreen. iOS Safari refuses all
            // three on non-video elements; surface that to the user so they
            // know Add to Home Screen is the real fullscreen path on iOS.
            function toggleFullscreen() {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    var exit = document.exitFullscreen || document.webkitExitFullscreen;
                    if (exit) { try { exit.call(document); } catch (e) {} }
                    return;
                }
                var targets = [document.documentElement, canvas];
                var tried   = 0;
                function tryNext() {
                    if (tried >= targets.length) {
                        if (Module && typeof Module.requestFullscreen === 'function') {
                            try { Module.requestFullscreen(false, false); } catch (e) {}
                        } else {
                            alert('Fullscreen is not supported by this browser. ' +
                                  'On iOS, add to Home Screen for a fullscreen app.');
                        }
                        return;
                    }
                    var el  = targets[tried++];
                    var req = el.requestFullscreen || el.webkitRequestFullscreen ||
                              el.mozRequestFullScreen || el.msRequestFullscreen;
                    if (!req) { tryNext(); return; }
                    var p = req.call(el);
                    if (p && typeof p.then === 'function') {
                        p.then(function () {}, function () { tryNext(); });
                    }
                }
                tryNext();
            }
            fsBtn.addEventListener('click', function (e) {
                e.preventDefault();
                toggleFullscreen();
            });

            // Fit the canvas to the visible viewport while preserving the
            // 800x450 logical aspect. The body is sized with 100dvh + safe-
            // area padding in CSS; read the padded content box directly so
            // the canvas is never placed under the notch or home indicator.
            //
            // iOS Safari subtlety: on reload, the URL bar / visualViewport /
            // env(safe-area-inset-*) can all transition across the first few
            // hundred ms. If layout() runs before they settle, the canvas
            // gets sized against a momentarily-wrong content box and stays
            // there until the next resize event. Run layout() again after a
            // few animation frames + a short timeout to catch the final state.
            function layout() {
                if (!isTouch) return;  // desktop uses CSS-native 800x450
                // Read the actual padded content box — computedStyle accounts
                // for env(safe-area-inset-*) once CSS has resolved it.
                var cs = getComputedStyle(document.body);
                var padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
                var padY = parseFloat(cs.paddingTop)  + parseFloat(cs.paddingBottom);
                var vv = window.visualViewport;
                var vh = vv ? vv.height : window.innerHeight;
                var vw = vv ? vv.width  : window.innerWidth;
                var usableW = Math.max(0, vw - padX);
                var usableH = Math.max(0, vh - padY);
                var aspect = 800 / 450;
                var w = usableW;
                var h = w / aspect;
                if (h > usableH) { h = usableH; w = h * aspect; }
                canvas.style.width  = w + 'px';
                canvas.style.height = h + 'px';
            }
            window.addEventListener('resize', layout);
            window.addEventListener('orientationchange', layout);
            window.addEventListener('load', layout);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', layout);
                // Intentionally NOT listening to visualViewport.scroll — on
                // iOS it fires during URL-bar transitions and feeds layout()
                // transient heights, which is exactly the "cropped on reload"
                // symptom. The resize event alone covers URL-bar settle.
            }
            // Defer the initial run so CSS env() has resolved and the URL bar
            // has finished its entry animation. Multiple passes cover the
            // iOS reload case where safe-area-inset-* values flip partway in.
            requestAnimationFrame(function () {
                layout();
                requestAnimationFrame(layout);
                setTimeout(layout, 120);
                setTimeout(layout, 400);
            });
        })();
        </script>
