    <!-- Web Style -->
    <!--
      Full-canvas layout: the wasm build is portrait (450x800) and uses
      in-canvas touch input (swipe to move, tap to interact, corner ⋮ menu for
      stats / inventory / save). The HTML shell no longer paints a virtual
      Gameboy pad — the only chrome is a small fullscreen toggle in the
      top-left, out of the way of the in-canvas menu button (top-right).
    -->
    <style>
        html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          /* dvh = dynamic viewport height — shrinks when the mobile URL bar is
             visible so the canvas is sized to what the user can actually see.
             Fallback to vh for browsers that don't support dvh. */
          height: 100vh;
          height: 100dvh;
          background-color: #1a1a1a; /* letterbox bars when aspect doesn't match */
          color: #2b2b2b;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          overflow: hidden;
          -webkit-user-select: none;
          user-select: none;
          -webkit-tap-highlight-color: transparent;
          overscroll-behavior: none;
        }
        body {
          display: flex;
          align-items: center;
          justify-content: center;
          /* viewport-fit=cover lets the page sit under the notch / home
             indicator / Dynamic Island on iPhone. Pad the body by the safe-
             area insets so the canvas (centered via flex) is never placed
             under system UI and its HUD corners stay reachable. */
          box-sizing: border-box;
          padding-top:    env(safe-area-inset-top, 0);
          padding-bottom: env(safe-area-inset-bottom, 0);
          padding-left:   env(safe-area-inset-left, 0);
          padding-right:  env(safe-area-inset-right, 0);
        }
        canvas.emscripten {
          display: block;
          border: 0 none;
          background-color: #F7EFD9;
          padding: 0;
          margin: 0;
          /* JS sets width/height per frame so the canvas fits the visible
             viewport and preserves the 450x800 aspect. */
          image-rendering: pixelated;            /* Chrome / Edge */
          image-rendering: -moz-crisp-edges;     /* Firefox */
          image-rendering: crisp-edges;          /* spec */
          touch-action: none;
        }

        /* Desktop — render at native portrait resolution. Fullscreen button
           still sits in the top-left but is rarely needed; desktop users hit
           F11 instead. */
        @media (hover: hover) and (pointer: fine) {
          canvas.emscripten {
            width: 450px;
            height: 800px;
          }
        }

        /* Floating fullscreen toggle. Small, translucent, parchment-styled so
           it doesn't clash with the in-canvas UI. Top-left so it doesn't
           collide with the in-game ⋮ menu button, which sits top-right. */
        #fs-btn {
          position: fixed;
          top: calc(8px + env(safe-area-inset-top, 0));
          left: calc(8px + env(safe-area-inset-left, 0));
          width: 36px;
          height: 36px;
          background: rgba(217, 201, 163, 0.85);
          color: #2b2b2b;
          border: 1.5px solid #2b2b2b;
          border-radius: 8px;
          font-size: 18px;
          line-height: 1;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          z-index: 10;
          -webkit-tap-highlight-color: transparent;
          touch-action: manipulation;
        }
        #fs-btn:active {
          background: rgba(184, 159, 108, 0.95);
        }
    </style>
    <script type='text/javascript' src="https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js/dist/FileSaver.min.js"> </script>
    <script type='text/javascript'>
        function saveFileFromMEMFSToDisk(memoryFSname, localFSname)     // This can be called by C/C++ code
        {
            var isSafari = false; // Not supported, navigator.userAgent access is being restricted
            //var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            var data = FS.readFile(memoryFSname);
            var blob;

            if (isSafari) blob = new Blob([data.buffer], { type: "application/octet-stream" });
            else blob = new Blob([data.buffer], { type: "application/octet-binary" });

            // NOTE: SaveAsDialog is a browser setting. For example, in Google Chrome,
            // in Settings/Advanced/Downloads section you have a setting:
            // 'Ask where to save each file before downloading' - which you can set true/false.
            // If you enable this setting it would always ask you and bring the SaveAsDialog
            saveAs(blob, localFSname);
        }
    </script>

    <body>
        <canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas>
        <button id="fs-btn" aria-label="Fullscreen">⛶</button>
        <p id="output" style="display:none"></p>
        <script>
            var Module = {
                print: (function() {
                    var element = document.getElementById('output');
                    if (element) element.value = ''; // clear browser cache
                    return function(text) {
                        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                        console.log(text);
                        if (element) {
                          element.value += text + "\n";
                          element.scrollTop = element.scrollHeight; // focus on bottom
                        }
                    };
                })(),
                canvas: (function() {
                    var canvas = document.getElementById('canvas');
                    // Prevent right-click context menu and native touch gestures
                    // (scroll / pinch-zoom / long-press image-save) on the canvas.
                    canvas.addEventListener('touchstart', function(e){ e.preventDefault(); }, { passive: false });
                    canvas.addEventListener('touchmove',  function(e){ e.preventDefault(); }, { passive: false });
                    return canvas;
                })(),
                // Persistent saves on the web build. MEMFS is the default (and
                // evaporates on reload), so we mount IDBFS at /save and pull
                // any previously-saved data into memory before main() runs.
                // save.c writes to /save/savegame.dat and calls FS.syncfs to
                // flush MEMFS → IndexedDB; the reverse pull happens here.
                // addRunDependency / removeRunDependency makes emscripten wait
                // for syncfs(true) to complete before invoking main().
                preRun: [function () {
                    if (typeof IDBFS === 'undefined') {
                        console.warn('IDBFS not linked — saves will not persist. ' +
                                     'Build needs -lidbfs.js.');
                        return;
                    }
                    try {
                        FS.mkdir('/save');
                    } catch (e) { /* already exists on hot reload — ignore */ }
                    try {
                        FS.mount(IDBFS, {}, '/save');
                    } catch (e) {
                        console.warn('IDBFS mount failed — saves will not persist:', e);
                        return;
                    }
                    addRunDependency('idbfs-sync');
                    FS.syncfs(true, function (err) {
                        if (err) console.warn('save syncfs(load) failed:', err);
                        else    console.log('save: IDBFS loaded from IndexedDB');
                        removeRunDependency('idbfs-sync');
                    });
                }]
            };
        </script>

        <script>
        (function () {
            var canvas = document.getElementById('canvas');
            var fsBtn  = document.getElementById('fs-btn');
            var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

            // Fullscreen toggle — tries documentElement, then canvas, then
            // emscripten's Module.requestFullscreen. iOS Safari refuses all
            // three on non-video elements; surface that to the user so they
            // know Add to Home Screen is the real fullscreen path on iOS.
            function toggleFullscreen() {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    var exit = document.exitFullscreen || document.webkitExitFullscreen;
                    if (exit) { try { exit.call(document); } catch (e) {} }
                    return;
                }
                var targets = [document.documentElement, canvas];
                var tried   = 0;
                function tryNext() {
                    if (tried >= targets.length) {
                        if (Module && typeof Module.requestFullscreen === 'function') {
                            try { Module.requestFullscreen(false, false); } catch (e) {}
                        } else {
                            alert('Fullscreen is not supported by this browser. ' +
                                  'On iOS, add to Home Screen for a fullscreen app.');
                        }
                        return;
                    }
                    var el  = targets[tried++];
                    var req = el.requestFullscreen || el.webkitRequestFullscreen ||
                              el.mozRequestFullScreen || el.msRequestFullscreen;
                    if (!req) { tryNext(); return; }
                    var p = req.call(el);
                    if (p && typeof p.then === 'function') {
                        p.then(function () {}, function () { tryNext(); });
                    }
                }
                tryNext();
            }
            fsBtn.addEventListener('click', function (e) {
                e.preventDefault();
                toggleFullscreen();
            });

            // Fit the canvas to the visible viewport while preserving the
            // 450x800 logical aspect. visualViewport reports height minus the
            // mobile URL bar, so the canvas shrinks when the bar slides in.
            // Subtract the safe-area insets (notch, home indicator) — the body
            // already pads by those, so the flex-centered canvas must fit in
            // the remaining usable box or its edges land under system UI.
            function layout() {
                var vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                var vw = window.visualViewport ? window.visualViewport.width  : window.innerWidth;
                // Ask the body for its padded (content-box) size — that's the
                // area we can safely fill. getBoundingClientRect includes
                // padding; clientWidth/Height excludes it, which is what we want.
                var usableW = document.body.clientWidth  || vw;
                var usableH = document.body.clientHeight || vh;
                document.body.style.height = vh + 'px';
                if (!isTouch) return;  // desktop uses CSS-native 450x800
                var aspect = 450 / 800;
                var h = usableH;
                var w = h * aspect;
                if (w > usableW) { w = usableW; h = w / aspect; }
                canvas.style.width  = w + 'px';
                canvas.style.height = h + 'px';
            }
            window.addEventListener('resize', layout);
            window.addEventListener('orientationchange', layout);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', layout);
                window.visualViewport.addEventListener('scroll', layout);
            }
            layout();
        })();
        </script>
